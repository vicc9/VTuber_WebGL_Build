<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity Web Player | VTuber_Frontend</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <style>
      /* 音頻解鎖遮罩 */
      #audio-unlock-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.82);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        color: #fff;
        font-family: sans-serif;
        gap: 16px;
        transition: opacity 0.4s ease;
      }
      #audio-unlock-overlay.hidden {
        opacity: 0;
        pointer-events: none;
      }
      #audio-unlock-overlay p {
        font-size: 18px;
        margin: 0;
        opacity: 0.85;
      }
      #audio-unlock-btn {
        padding: 14px 40px;
        font-size: 20px;
        font-weight: bold;
        border: none;
        border-radius: 8px;
        background: #4a9eff;
        color: #fff;
        cursor: pointer;
        box-shadow: 0 4px 20px rgba(74,158,255,0.5);
        transition: transform 0.1s, background 0.2s;
      }
      #audio-unlock-btn:hover { background: #2e85e8; }
      #audio-unlock-btn:active { transform: scale(0.97); }
    </style>
  </head>
  <body>

    <div id="audio-unlock-overlay">
      <p>🎙️ 點擊以進入直播間並啟用語音功能</p>
      <button id="audio-unlock-btn">進入直播間</button>
    </div>

    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width=960 height=600 tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
      <div id="unity-footer">
        <div id="unity-logo-title-footer"></div>
        <div id="unity-fullscreen-button"></div>
        <div id="unity-build-title">VTuber_Frontend</div>
      </div>
    </div>

    <script>
      // ══════════════════════════════════════════
      // 1. AudioContext 解鎖管理器
      //    必須在用戶點擊後才能 resume()，
      //    否則瀏覽器會阻擋所有 Web Audio API 呼叫。
      // ══════════════════════════════════════════
      var AudioUnlocker = {
        _ctx: null,
        _unlocked: false,

        unlock: function() {
          if (this._unlocked) return;

          try {
            // 建立或復用 AudioContext
            var AC = window.AudioContext || window.webkitAudioContext;
            if (!AC) {
              console.warn("[Audio] 此瀏覽器不支援 AudioContext");
              return;
            }

            this._ctx = new AC();

            var self = this;
            this._ctx.resume().then(function() {
              self._unlocked = true;
              console.log("[Audio] ✅ AudioContext 解鎖成功，state:", self._ctx.state);

              // ── 關鍵：通知 Unity WebGL 音訊系統已就緒 ──
              // Unity WebGL 在內部維護了自己的 AudioContext；
              // 我們需要對它發送一個靜音的 buffer，讓瀏覽器
              // 將 Unity 的 AudioContext 也標記為「已被用戶手勢啟動」。
              self._pingSilence();
            }).catch(function(e) {
              console.error("[Audio] AudioContext resume 失敗:", e);
            });

          } catch(e) {
            console.error("[Audio] 建立 AudioContext 失敗:", e);
          }
        },

        // 用靜音 buffer 觸發瀏覽器解鎖 Unity 內部的 AudioContext
        _pingSilence: function() {
          try {
            var buf = this._ctx.createBuffer(1, 1, 22050);
            var src = this._ctx.createBufferSource();
            src.buffer = buf;
            src.connect(this._ctx.destination);
            src.start(0);
            console.log("[Audio] 靜音 ping 已送出，Unity AudioContext 應已解鎖");
          } catch(e) {
            console.warn("[Audio] 靜音 ping 失敗:", e);
          }
        },

        isUnlocked: function() { return this._unlocked; }
      };

      // ══════════════════════════════════════════
      // 2. 解鎖遮罩按鈕邏輯
      // ══════════════════════════════════════════
      var overlay = document.getElementById("audio-unlock-overlay");
      var unlockBtn = document.getElementById("audio-unlock-btn");

      unlockBtn.addEventListener("click", function() {
        // 解鎖音頻
        AudioUnlocker.unlock();

        // 淡出並移除遮罩
        overlay.classList.add("hidden");
        setTimeout(function() {
          overlay.style.display = "none";
        }, 450);

        console.log("[UI] 用戶已點擊，遮罩關閉");
      });

      // ══════════════════════════════════════════
      // 3. Unity WebGL 載入器
      // ══════════════════════════════════════════
      var canvas = document.querySelector("#unity-canvas");

      function unityShowBanner(msg, type) {
        var warningBanner = document.querySelector("#unity-warning");
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/VTuber_WebGL_Build.loader.js";
      var config = {
        arguments: [],
        dataUrl:         buildUrl + "/VTuber_WebGL_Build.data",
        frameworkUrl:    buildUrl + "/VTuber_WebGL_Build.framework.js",
        codeUrl:         buildUrl + "/VTuber_WebGL_Build.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName:     "DefaultCompany",
        productName:     "VTuber_Frontend",
        productVersion:  "0.1.0",
        showBanner:      unityShowBanner,
      };

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        var meta = document.createElement('meta');
        meta.name    = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
        document.querySelector("#unity-container").className = "unity-mobile";
        canvas.className = "unity-mobile";
      } else {
        canvas.style.width  = "960px";
        canvas.style.height = "600px";
      }

      document.querySelector("#unity-loading-bar").style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
        }).then((unityInstance) => {

          // ── 關鍵：讓 jslib 的 SendMessage 能找到 Unity Instance ──
          window.unityInstance = unityInstance;

          document.querySelector("#unity-loading-bar").style.display = "none";
          document.querySelector("#unity-fullscreen-button").onclick = () => {
            unityInstance.SetFullscreen(1);
          };

          console.log("[Unity] ✅ Unity 實例已建立");

        }).catch((message) => {
          alert(message);
        });
      };
      document.body.appendChild(script);
    </script>
  </body>
</html>
